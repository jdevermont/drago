<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preview: Paula Ingabire Video Embed</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
        }
        .preview-card {
            background: #16213e;
            border-radius: 16px;
            max-width: 680px;
            width: 100%;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }
        .card-header {
            background: linear-gradient(135deg, #0f3460, #533483);
            padding: 24px 32px;
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .profile-photo {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: #e94560;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: 700;
            color: white;
            flex-shrink: 0;
        }
        .profile-info h2 {
            font-size: 22px;
            font-weight: 600;
            color: #fff;
        }
        .profile-info p {
            font-size: 14px;
            color: #a0b4d0;
            margin-top: 4px;
        }
        .section-label {
            padding: 20px 32px 12px;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #e94560;
            font-weight: 600;
        }
        .video-embed-container {
            padding: 0 32px 28px;
        }
        .video-embed-title {
            font-size: 16px;
            font-weight: 600;
            color: #c8d6e5;
            margin-bottom: 14px;
        }
        .video-thumbnail-link {
            display: block;
            text-decoration: none;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
        }
        .video-thumbnail-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%;
            background: #0a0a1a;
            border-radius: 12px;
            overflow: hidden;
        }
        .video-thumbnail {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }
        .video-thumbnail-wrapper:hover .video-thumbnail {
            transform: scale(1.03);
        }
        .video-play-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.25);
            transition: background 0.3s ease;
        }
        .video-thumbnail-wrapper:hover .video-play-overlay {
            background: rgba(0,0,0,0.15);
        }
        .video-play-button svg {
            width: 68px;
            height: 48px;
            filter: drop-shadow(0 2px 8px rgba(0,0,0,0.4));
        }
        .video-thumbnail-caption {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 12px;
            background: linear-gradient(transparent, rgba(0,0,0,0.7));
            color: #fff;
            font-size: 13px;
            text-align: center;
        }
        .badge {
            display: inline-block;
            background: #e94560;
            color: white;
            font-size: 11px;
            padding: 3px 10px;
            border-radius: 20px;
            font-weight: 600;
            margin-left: 8px;
            vertical-align: middle;
        }
    </style>
</head>
<body>
    <div class="preview-card">
        <div class="card-header">
            <div class="profile-photo">PI</div>
            <div class="profile-info">
                <h2>Paula Ingabire</h2>
                <p>Minister of ICT and Innovation &bull; Rwanda</p>
            </div>
        </div>

        <div class="section-label">Meeting With Them &mdash; Video <span class="badge">NEW</span></div>

        <div class="video-embed-container">
            <h4 class="video-embed-title">&#x1F4F9; Watch: Paula Ingabire Interview with ALX</h4>
            <a href="https://www.youtube.com/watch?v=KZkiPhH2uvU" target="_blank" class="video-thumbnail-link">
                <div class="video-thumbnail-wrapper">
                    <img src="https://img.youtube.com/vi/KZkiPhH2uvU/maxresdefault.jpg"
                         alt="Paula Ingabire Interview with ALX"
                         class="video-thumbnail"
                         onerror="this.src='https://img.youtube.com/vi/KZkiPhH2uvU/hqdefault.jpg'">
                    <div class="video-play-overlay">
                        <div class="video-play-button">
                            <svg viewBox="0 0 68 48">
                                <path d="M66.52,7.74c-0.78-2.93-2.49-5.41-5.42-6.19C55.79,.13,34,0,34,0S12.21,.13,6.9,1.55 C3.97,2.33,2.27,4.81,1.48,7.74C0.06,13.05,0,24,0,24s0.06,10.95,1.48,16.26c0.78,2.93,2.49,5.41,5.42,6.19 C12.21,47.87,34,48,34,48s21.79-0.13,27.1-1.55c2.93-0.78,4.64-3.26,5.42-6.19C67.94,34.95,68,24,68,24S67.94,13.05,66.52,7.74z" fill="#FF0000"/>
                                <path d="M 45,24 27,14 27,34" fill="white"/>
                            </svg>
                        </div>
                        <div class="video-thumbnail-caption">Click to watch on YouTube</div>
                    </div>
                </div>
            </a>
        </div>
    </div>
</body>
</html>
